name: ktask-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: ktask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ktask
      POSTGRES_USER: ktask
      POSTGRES_PASSWORD: ktask
      TZ: America/Sao_Paulo
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ktask -d ktask']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ktask-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ktask-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ktask-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio miniominio;
      mc mb -p local/ktask-attachments || true;
      mc anonymous set download local/ktask-attachments || true;
      echo 'MinIO bucket ktask-attachments ready';
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: ktask-mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  pgdata:
  redisdata:
  miniodata:
