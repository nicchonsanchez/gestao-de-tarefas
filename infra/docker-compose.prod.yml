name: ktask-prod

# Stack de produção do KTask, pensado pra rodar numa VPS única (Hetzner CX23 ou similar).
# Uso:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env up -d --build
#
# Requer:
#   infra/prod.env com todas as variáveis de ambiente (ver infra/prod.env.example)
#   DNS A records apontando pra este servidor:
#     ktask.agenciakharis.com.br        -> IP do server
#     api.ktask.agenciakharis.com.br    -> IP do server

services:
  postgres:
    image: postgres:16-alpine
    container_name: ktask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ktask}
      POSTGRES_USER: ${POSTGRES_USER:-ktask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Sao_Paulo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ktask} -d ${POSTGRES_DB:-ktask}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ktask]

  redis:
    image: redis:7-alpine
    container_name: ktask-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes', '--save', '60', '1']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ktask]

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: ktask-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${POSTGRES_USER:-ktask}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ktask}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      CORS_ORIGINS: ${CORS_ORIGINS}
      EMAIL_FROM: ${EMAIL_FROM:-KTask <noreply@agenciakharis.com.br>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EVOLUTION_DEFAULT_URL: ${EVOLUTION_DEFAULT_URL:-}
      EVOLUTION_DEFAULT_API_KEY: ${EVOLUTION_DEFAULT_API_KEY:-}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY}
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1:4000/healthz']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks: [ktask]

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_APP_NAME: KTask
    container_name: ktask-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O-', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    networks: [ktask]

  caddy:
    image: caddy:2-alpine
    container_name: ktask-caddy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    depends_on:
      - web
      - api
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      KTASK_WEB_DOMAIN: ${KTASK_WEB_DOMAIN}
      KTASK_API_DOMAIN: ${KTASK_API_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks: [ktask]

networks:
  ktask:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
